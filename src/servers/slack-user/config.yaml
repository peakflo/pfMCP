name: "Slack User Token pfMCP Server"
icon: "assets/icon.png"
description: "Post Slack messages as the authenticated user (no bot badge). Uses user-level OAuth tokens (xoxp-)."
documentation_path: "README.md"
resources:
  - name: "channel"
    description: "Slack channels, including public and private ones. Content typically includes a list of messages."
    required_scopes:
      - "channels:history"
      - "groups:history"
      - "channels:read"
tools:
  - name: "read_messages"
    description: "Read messages from a Slack channel"
    required_scopes:
      - "channels:history"
      - "groups:history"
      - "im:read"
  - name: "send_message"
    description: "Send a message as the authenticated user"
    required_scopes:
      - "chat:write"
  - name: "create_canvas"
    description: "Create a Slack canvas message as the authenticated user"
    required_scopes:
      - "chat:write"
  - name: "react_to_message"
    description: "Add a reaction to a message"
    required_scopes:
      - "reactions:write"
  - name: "delete_message"
    description: "Delete a Slack message"
    required_scopes:
      - "chat:write"
  - name: "get_message_thread"
    description: "Retrieve a message and its replies"
    required_scopes:
      - "channels:history"
      - "groups:history"
      - "im:read"
  - name: "get_user_presence"
    description: "Check a user's online status"
    required_scopes:
      - "users:read"
